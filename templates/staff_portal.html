<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Portal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-content">
                <div>
                    <h1>🏥 Staff Portal</h1>
                    <p>Hospital meal management system</p>
                </div>
                <a href="/" class="add-patient-btn">
                    👤 Patient Login
                </a>
            </div>
        </div>

        <div class="patients-grid">
            <a href="/staff/patients" class="patient-card">
                <div class="patient-header">
                    <div class="patient-avatar" style="background: #4ECDC4;">
                        👥
                    </div>
                    <div class="patient-info">
                        <h3>Patient Management</h3>
                        <p class="patient-age">View and manage all patients</p>
                    </div>
                </div>
            </a>

            <a href="/kitchen" class="patient-card">
                <div class="patient-header">
                    <div class="patient-avatar" style="background: #FF6B9D;">
                        👨‍🍳
                    </div>
                    <div class="patient-info">
                        <h3>Kitchen Dashboard</h3>
                        <p class="patient-age">Manage meal orders</p>
                    </div>
                </div>
            </a>

            <a href="/add-patient" class="patient-card">
                <div class="patient-header">
                    <div class="patient-avatar" style="background: #95E1D3;">
                        ➕
                    </div>
                    <div class="patient-info">
                        <h3>Add New Patient</h3>
                        <p class="patient-age">Register a new patient</p>
                    </div>
                </div>
            </a>
        </div>
    </div>
</body>
</html>
