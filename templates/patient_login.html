<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Login - Hospital Meal Planner</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        .login-container {
            max-width: 500px;
            margin: 10vh auto;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.15);
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .login-card h1 {
            font-size: 2rem;
            color: white;
            margin-bottom: 0.5rem;
        }

        .login-card p {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1rem;
        }

        .error-message {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid rgba(244, 67, 54, 0.4);
            color: white;
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        /* Demo Credentials Styling */
        .demo-credentials {
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 1.25rem;
            margin-top: 1.5rem;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }

        .demo-credentials-title {
            margin: 0 0 12px 0;
            font-size: 0.95rem;
            font-weight: 600;
            color: rgba(255,255,255,0.95);
            text-align: center;
        }

        .demo-credentials p {
            margin: 6px 0;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.85);
            text-align: center;
        }

        .demo-credentials strong {
            color: rgba(255,255,255,0.95);
        }

        .staff-link {
            text-align: center;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }

        .staff-link a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .staff-link a:hover {
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-container">
            <div class="login-card">
                <div class="login-header">
                    <div class="login-icon">🍽️</div>
                    <h1>Patient Meal Portal</h1>
                    <p>Enter your details to view your personalized meal plan, NAME: Sarah Chen <br> DOB: 15/03/1968</p>
                </div>

                <div id="errorMessage" class="error-message"></div>

                <form id="patientLoginForm">
                    <div class="form-group">
                        <label class="form-label" for="fullName">Full Name</label>
                        <input 
                            type="text" 
                            id="fullName" 
                            name="fullName" 
                            class="form-input" 
                            placeholder="e.g., Sarah Chen"
                            pattern="[A-Za-z\s]+"
                            title="Please enter letters only"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="dob">Date of Birth</label>
                        <input 
                            type="date" 
                            id="dob" 
                            name="dob" 
                            class="form-input"
                            required
                        >
                    </div>

                    <button type="submit" class="submit-btn">
                        View My Meals
                    </button>
                </form>

                <!-- Demo Credentials Section -->
                <div class="demo-credentials">
                    <p class="demo-credentials-title">Demo Credentials:</p>
                    <p><strong>Name:</strong> Sarah Chen</p>
                    <p><strong>DOB:</strong> 1968-03-15</p>
                </div>

                <div class="staff-link">
                    <a href="/staff">🔒 Staff Access</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('patientLoginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const fullName = document.getElementById('fullName').value;
            const dob = document.getElementById('dob').value;
            const errorDiv = document.getElementById('errorMessage');

            // Validate name (letters and spaces only)
            const nameRegex = /^[A-Za-z\s]+$/;
            if (!nameRegex.test(fullName)) {
                errorDiv.textContent = 'Please enter a valid name (letters only)';
                errorDiv.classList.add('show');
                return;
            }

            try {
                const response = await fetch('https://dakariw-hospital-hvc5a7aafad8byes.ukwest-01.azurewebsites.net/api/patient-login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        full_name: fullName,
                        dob: dob
                    })
                });

                const result = await response.json();

                if (result.success) {
                    // Redirect to patient meal page
                    window.location.href = `/patient/${result.patient_id}/meals`;
                } else {
                    errorDiv.textContent = result.message || 'Patient not found. Please check your details.';
                    errorDiv.classList.add('show');
                }
            } catch (error) {
                console.error('Login error:', error);
                errorDiv.textContent = 'An error occurred. Please try again.';
                errorDiv.classList.add('show');
            }
        });

        // Clear error message when user starts typing
        document.getElementById('fullName').addEventListener('input', function() {
            document.getElementById('errorMessage').classList.remove('show');
        });

        document.getElementById('dob').addEventListener('input', function() {
            document.getElementById('errorMessage').classList.remove('show');
        });
    </script>
</body>
</html>
